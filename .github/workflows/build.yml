# ─────────────────────────────────────────────────────────────
#  triageX — Cross-Platform Build Pipeline
# ─────────────────────────────────────────────────────────────
#  Builds native packages on every tag push or manual dispatch:
#    Windows  → ForensicTool.exe  (one-dir + zip)
#    macOS    → ForensicTool.app  (bundled in .dmg)
#    Linux    → ForensicTool      (one-file binary)
#
#  Artifacts are uploaded to the GitHub Release automatically.
# ─────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    tags:
      - "v*"            # Trigger on version tags: v2.0.0, v2.1.0, etc.
  workflow_dispatch:     # Manual trigger from GitHub UI
    inputs:
      version:
        description: "Version label (e.g. 2.0.0-beta)"
        required: false
        default: "dev"

permissions:
  contents: write        # Needed for creating releases

jobs:
  # ── Windows Build ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract
          pip install pywin32 wmi
          python -c "import subprocess, sys, os; post=os.path.join(os.path.dirname(sys.executable), 'Scripts', 'pywin32_postinstall.py'); subprocess.run([sys.executable, post, '-install'], check=False) if os.path.exists(post) else None" || true
          pip install pandas
          pip install opencv-python-headless || pip install opencv-python || echo "opencv not available, skipping"
          pip install pytsk3 || echo "pytsk3 not available on this runner, skipping"

      - name: Build Windows EXE
        run: python build.py --target windows --mode onedir

      - name: Package distribution
        run: |
          cd dist
          Compress-Archive -Path ForensicTool -DestinationPath ForensicTool-Windows-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-Windows-x64
          path: dist/ForensicTool-Windows-x64.zip

  # ── macOS Build ────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract pandas opencv-python
          brew install tesseract create-dmg || true

      - name: Build macOS .app
        run: python build.py --target macos --mode onedir

      - name: Package distribution
        run: |
          cd dist
          # If .dmg was created by build.py, use it; otherwise zip the .app
          if ls *.dmg 1>/dev/null 2>&1; then
            mv *.dmg ForensicTool-macOS-arm64.dmg
          else
            zip -r ForensicTool-macOS-arm64.zip ForensicTool.app/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-macOS-arm64
          path: dist/ForensicTool-macOS-*

  # ── Linux Build ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libxkbcommon0 \
            libgl1-mesa-glx \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            tesseract-ocr \
            libsm6 \
            libxext6 \
            libglib2.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract pandas
          pip install opencv-python-headless || echo "opencv not available, skipping"

      - name: Build Linux binary
        run: python build.py --target linux --mode onefile

      - name: Package distribution
        run: |
          cd dist
          tar -czf ForensicTool-Linux-x64.tar.gz ForensicTool ForensicTool.desktop README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-Linux-x64
          path: dist/ForensicTool-Linux-x64.tar.gz

  # ── Create GitHub Release ──────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "triageX ${{ github.ref_name }}"
          body: |
            ## triageX ${{ github.ref_name }}

            ### Downloads
            | Platform | File | How to Run |
            |----------|------|------------|
            | **Windows** | `ForensicTool-Windows-x64.zip` | Extract → Right-click `.exe` → Run as Administrator |
            | **macOS** | `ForensicTool-macOS-arm64.dmg` | Mount DMG → Drag to Applications → `sudo open ForensicTool.app` |
            | **Linux** | `ForensicTool-Linux-x64.tar.gz` | Extract → `chmod +x ForensicTool` → `sudo ./ForensicTool` |

            ### Requirements
            - Elevated privileges (Administrator / root / sudo)
            - 4 GB RAM minimum
            - 500 MB free disk space

            ### What's New
            - Cross-platform support (Windows, macOS, Linux)
            - Memory analysis module
            - Auto OS detection
            - Modern PyQt6 interface
          files: |
            ForensicTool-Windows-x64/*.zip
            ForensicTool-macOS-arm64/*
            ForensicTool-Linux-x64/*.tar.gz
          draft: false
          prerelease: false
