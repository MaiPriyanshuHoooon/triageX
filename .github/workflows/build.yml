# ─────────────────────────────────────────────────────────────
#  triageX — Cross-Platform Build Pipeline
# ─────────────────────────────────────────────────────────────
#  Builds native packages on every tag push or manual dispatch:
#    Windows  → ForensicTool.exe  (one-dir + zip)
#    macOS    → ForensicTool.dmg  (app bundle in DMG)
#    Linux    → ForensicTool      (one-file binary)
#
#  Artifacts are uploaded to the GitHub Release automatically.
# ─────────────────────────────────────────────────────────────

name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label (e.g. 2.0.0-beta)"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  # ── Windows Build ──────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract pandas
          pip install pywin32 wmi
          pip install opencv-python-headless || echo "opencv not available, skipping"
          pip install pytsk3 || echo "pytsk3 not available, skipping"

      - name: Verify pywin32
        run: python -c "import win32api; print('pywin32 OK')"

      - name: Build Windows EXE
        run: python build.py --target windows --mode onedir

      - name: Package distribution
        run: |
          cd dist
          Compress-Archive -Path ForensicTool -DestinationPath ForensicTool-Windows-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-Windows-x64
          path: dist/ForensicTool-Windows-x64.zip

  # ── macOS Build ────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract pandas opencv-python
          brew install tesseract || true
          brew install create-dmg || true

      - name: Build macOS .app
        run: python build.py --target macos --mode onedir

      - name: Create launcher script
        run: |
          # Create a wrapper script that asks for admin and launches the app
          cat > dist/triageX-Launcher.command << 'LAUNCHER'
          #!/bin/bash
          # ─────────────────────────────────────────────────────
          #  triageX Forensic Tool — macOS Launcher
          # ─────────────────────────────────────────────────────
          #  Double-click this file to launch triageX.
          #  It will ask for your password to get full
          #  forensic access (disk, network, processes).
          # ─────────────────────────────────────────────────────

          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          APP_PATH="$SCRIPT_DIR/ForensicTool.app"
          BINARY="$APP_PATH/Contents/MacOS/ForensicTool"

          if [ ! -d "$APP_PATH" ]; then
              osascript -e 'display dialog "ForensicTool.app not found.\nMake sure it is in the same folder as this launcher." with title "triageX" buttons {"OK"} default button "OK" with icon stop'
              exit 1
          fi

          # Remove quarantine attribute so macOS doesn't block it
          xattr -rd com.apple.quarantine "$APP_PATH" 2>/dev/null

          # Launch the actual binary with elevated privileges.
          # Using the binary directly (not "open") so sudo context is preserved.
          osascript -e "do shell script \"'$BINARY'\" with administrator privileges"
          LAUNCHER
          chmod +x dist/triageX-Launcher.command

      - name: Create DMG
        run: |
          # Create a nice DMG with the app + launcher
          create-dmg \
            --volname "triageX Forensic Tool" \
            --volicon "assets/icon.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "ForensicTool.app" 180 170 \
            --icon "triageX-Launcher.command" 480 170 \
            --icon ".README.txt" 330 310 \
            --hide-extension "ForensicTool.app" \
            --app-drop-link 330 170 \
            --background "assets/dmg_bg.png" \
            "dist/ForensicTool-macOS-arm64.dmg" \
            "dist/" \
          || {
            echo "create-dmg with custom layout failed, trying simple DMG..."
            # Fallback: simple DMG without background image
            create-dmg \
              --volname "triageX Forensic Tool" \
              --window-pos 200 120 \
              --window-size 600 380 \
              --icon-size 80 \
              --icon "ForensicTool.app" 150 170 \
              --icon "triageX-Launcher.command" 450 170 \
              --app-drop-link 300 170 \
              "dist/ForensicTool-macOS-arm64.dmg" \
              "dist/" \
            || {
              echo "create-dmg failed entirely, falling back to hdiutil..."
              hdiutil create -volname "triageX" -srcfolder dist/ -ov -format UDZO "dist/ForensicTool-macOS-arm64.dmg"
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-macOS-arm64
          path: dist/ForensicTool-macOS-arm64.dmg

  # ── Linux Build ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libxkbcommon0 \
            libgl1-mesa-glx \
            libgl1 \
            libegl1 \
            libdbus-1-3 \
            tesseract-ocr \
            libsm6 \
            libxext6 \
            libglib2.0-0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install requests cryptography PyQt6 PyQt6-Qt6 PyQt6-sip psutil watchdog
          pip install PyPDF2 python-docx openpyxl Pillow pytesseract pandas
          pip install opencv-python-headless || echo "opencv not available, skipping"

      - name: Build Linux binary
        run: python build.py --target linux --mode onefile

      - name: Package distribution
        run: |
          cd dist
          tar -czf ForensicTool-Linux-x64.tar.gz ForensicTool ForensicTool.desktop README.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForensicTool-Linux-x64
          path: dist/ForensicTool-Linux-x64.tar.gz

  # ── Create GitHub Release ──────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "triageX ${{ github.ref_name }}"
          body: |
            ## triageX ${{ github.ref_name }}

            ### Downloads
            | Platform | File | How to Run |
            |----------|------|------------|
            | **Windows** | `ForensicTool-Windows-x64.zip` | Extract → Right-click `.exe` → Run as Administrator |
            | **macOS** | `ForensicTool-macOS-arm64.dmg` | Double-click DMG → Double-click **triageX-Launcher** → Enter password |
            | **Linux** | `ForensicTool-Linux-x64.tar.gz` | Extract → `chmod +x ForensicTool` → `sudo ./ForensicTool` |

            ### Linux Memory Acquisition (AVML)
            - The Linux build bundles **Microsoft AVML v0.17.0** for full physical memory dumps
            - Produces LiME-format images compatible with Volatility 3 and Rekall
            - Requires root/sudo — memory dump file is downloadable from the HTML report
            - Supports x86_64 and aarch64 architectures

            ### macOS Users
            - Open the `.dmg` file — no Terminal commands needed
            - Double-click **triageX-Launcher.command** inside the DMG
            - macOS will ask for your password to grant forensic access
            - If blocked by Gatekeeper: System Settings → Privacy & Security → Open Anyway
            - Optionally drag `ForensicTool.app` to your Applications folder

            ### Requirements
            - Elevated privileges (Administrator / root / sudo)
            - 4 GB RAM minimum
            - 500 MB free disk space

            ### What's New in ${{ github.ref_name }}
            - **Write Blocker**: Software write-blocking for USB/external drives on Windows (registry + per-disk via PowerShell Set-Disk)
            - **License Key Generator**: Standalone admin GUI to generate device-locked license keys without touching code
            - **1-Day Trial**: Trial period reduced to 1 day with full feature access
            - **License bug fix**: Expiry date now displays correctly in the License Info tab
            - **Tab bar scrolling**: Tab bar now scrolls horizontally when tabs overflow window width
            - **UI cleanup**: All emojis removed from application UI for a professional appearance
          files: |
            ForensicTool-Windows-x64/*.zip
            ForensicTool-macOS-arm64/*.dmg
            ForensicTool-Linux-x64/*.tar.gz
          draft: false
          prerelease: false
